<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NFT Gate</title>

<script src="https://unpkg.com/@solana/web3.js@1.95.4/lib/index.iife.min.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #0b0f1a;
  color: white;
  display: grid;
  place-items: center;
  height: 100vh;
}
.card {
  background: #121826;
  padding: 2rem;
  border-radius: 16px;
  text-align: center;
  width: 360px;
}
button {
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  background: #7c3aed;
  color: white;
  cursor: pointer;
}
.hidden { display:none; }
.addr {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 10px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="card">

<div id="connect">
  <h2>Connect Wallet</h2>
  <button onclick="connectWallet()">Connect</button>
</div>

<div id="loading" class="hidden">
  <p>Checking NFTs...</p>
</div>

<div id="success" class="hidden">
  <h2>✅ Access Granted</h2>
  <div id="addr1" class="addr"></div>
</div>

<div id="fail" class="hidden">
  <h2>❌ Not a Holder</h2>
  <div id="addr2" class="addr"></div>
</div>

<div id="error" class="hidden">
  <h2>⚠️ Error</h2>
  <div id="err"></div>
</div>

</div>

<script>
const COLLECTION_MINT = "7RHNii678utwGh56Q4NA6xt2cfq8RukHk42KTv8ky4gf";
const HELIUS_API_KEY = "60105ec9-415b-4348-acef-4d3a07447582"; // ← replace this

function show(id) {
  ["connect","loading","success","fail","error"].forEach(x =>
    document.getElementById(x).classList.add("hidden")
  );
  document.getElementById(id).classList.remove("hidden");
}

async function connectWallet() {
  const provider = window.phantom?.solana ?? window.solana;

  if (!provider) {
    document.getElementById("err").textContent = "Phantom wallet not found.";
    return show("error");
  }

  try {
    const { publicKey } = await provider.connect();

    show("loading");

    const isHolder = await checkNFTs(publicKey);

    if (isHolder) {
      document.getElementById("addr1").textContent = publicKey.toBase58();
      show("success");
    } else {
      document.getElementById("addr2").textContent = publicKey.toBase58();
      show("fail");
    }

  } catch (err) {
    document.getElementById("err").textContent =
      err.message || "Something went wrong";
    show("error");
  }
}

async function checkNFTs(pubkey) {
  const url = `https://api.helius.xyz/v0/addresses/${pubkey.toBase58()}/assets?api-key=${HELIUS_API_KEY}`;

  const res = await fetch(url);

  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Helius error ${res.status}: ${text}`);
  }

  const data = await res.json();

  console.log("Helius assets:", data);

  if (!data.items || !data.items.length) return false;

  return data.items.some(nft => {

    // ✅ Primary method (most reliable)
    if (nft.grouping) {
      const match = nft.grouping.some(g =>
        g.group_key === "collection" &&
        g.group_value === COLLECTION_MINT
      );
      if (match) return true;
    }

    // ✅ Fallback (older NFTs)
    if (nft.collection?.key === COLLECTION_MINT) {
      return true;
    }

    return false;
  });
}
</script>

</body>
</html>
